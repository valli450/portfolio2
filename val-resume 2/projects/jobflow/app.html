<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f4f6f4">
<title>JobFlow - Live Demo</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2317734b'/%3E%3Ctext x='32' y='42' font-family='system-ui' font-size='30' font-weight='700' fill='white' text-anchor='middle'%3EJF%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="app.css">
</head>
<body>
<div id="app" class="app" aria-live="polite">
  <div class="statusbar" id="statusbar">
    <span class="sb-time" id="sb-time">9:41</span>
    <span class="sb-right">
      <span class="sb-signal" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
      <span class="sb-batt" aria-hidden="true"><b></b></span>
    </span>
  </div>
  <main class="screen-holder" id="screen"></main>
  <nav class="tabbar" id="tabbar" hidden></nav>
  <div class="sheet-layer" id="sheet-layer" hidden>
    <div class="sheet-backdrop" data-action="close-sheet"></div>
    <section class="sheet" id="sheet" role="dialog" aria-modal="true"></section>
  </div>
  <div class="toast-layer" id="toast-layer" aria-live="assertive"></div>
  <div class="tour-layer" id="tour-layer" hidden>
    <div class="tour-card" id="tour-card"></div>
  </div>
</div>
<script src="icons.js"></script>
<script src="app.js"></script>
</body>
</html>
